name: Daily PWA Cache Refresh

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update service worker cache version
        run: |
          DATE=$(date +%Y%m%d)
          sed -i "s/const CACHE_NAME = '.*'/const CACHE_NAME = 'pmci-v1-$DATE'/" sw.js
          echo "Updated CACHE_NAME to pmci-v1-$DATE"
          head -1 sw.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet sw.js || (git add sw.js && git commit -m "chore: daily cache refresh $(date +%Y-%m-%d)" && git push)
